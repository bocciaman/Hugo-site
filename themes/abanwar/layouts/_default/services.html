{{define "main"}}

<!-- services -->
<!-- Services -->
{{ with .Params.services }} {{ if .enable }}
<section class="section">
  <div class="container">
    <div class="row">
      <div class="col-lg-8 mx-auto">
        <h1 class="mb-4"><span class="text-primary">{{ .heading }}</span></h1>

        {{ range .service }}
        <article class="article-list row align-items-center mb-5">
          <div class="col-md-5 pt-3 pb-3">
            {{ if .icon }}
            <div class="w-100 d-flex align-items-center justify-content-center" style="aspect-ratio:1/1;background:#211f55;border-radius:8px;">
              <i class="{{ .icon }}" style="font-size:4.5rem;color:#fff;"></i>
            </div>
            {{ else }}
            <img class="w-100" src="{{ .image }}" alt="{{ .title }}" />
            {{ end }}
          </div>

          <div class="col-md-7">
            <div class="card-block service-content">
              <h2 class="h4 text-uppercase">{{ .title }}</h2>
              {{ .text | markdownify }}
            </div>
          </div>
        </article>
        {{ end }}
      </div>
    </div>
  </div>
</section>
{{ end }} {{ end }}
<!-- /services -->

{{end}}
