<!-- main footer -->
<footer class="py-4 bg-light border-top footer-no-dark">
  <style>
    /* =========================================================
       Footer should stay LIGHT even when dark mode is active
       ========================================================= */

    body.dark-mode footer.footer-no-dark {
      background-color: #fff !important;
      color: #111 !important;
    }

    /* Remove dark-mode "box" effects for footer links ONLY.
       IMPORTANT: do NOT include :hover/:focus here, or it will override your hover color. */
    body.dark-mode footer.footer-no-dark a,
    body.dark-mode footer.footer-no-dark a:visited {
      color: #111 !important;
      background: transparent !important;
      box-shadow: none !important;
      filter: none !important;
      opacity: 1 !important;
      mix-blend-mode: normal !important;
      text-decoration: none !important;
    }

    /* Footer menu links: base style (light + dark) */
    footer.footer-no-dark .footer-menu-link {
      color: #111 !important;
      background: transparent !important;
      text-decoration: none !important;
      display: inline-block;
      padding: 8px 12px;
      transition: color 0.2s ease, text-decoration 0.2s ease;
    }

    /* Hover style you want (wins in dark mode + light mode) */
    body.dark-mode footer.footer-no-dark .footer-menu-link:hover,
    body.dark-mode footer.footer-no-dark .footer-menu-link:focus,
    footer.footer-no-dark .footer-menu-link:hover,
    footer.footer-no-dark .footer-menu-link:focus {
      color: #47C4F1 !important;
      text-decoration: underline !important;
    }

    /* Social icons: ensure the <a> wrapper doesn't get a dark background */
    body.dark-mode footer.footer-no-dark .social-icon a {
      background: transparent !important;
      box-shadow: none !important;
      filter: none !important;
      opacity: 1 !important;
    }

    /* Ensure icon color stays readable on white footer */
    body.dark-mode footer.footer-no-dark .social-icon i {
      color: #111 !important;
    }

    /* If any LI/padding classes are getting backgrounds, wipe them */
    body.dark-mode footer.footer-no-dark li,
    body.dark-mode footer.footer-no-dark .list-inline-item,
    body.dark-mode footer.footer-no-dark .px-3,
    body.dark-mode footer.footer-no-dark .py-2 {
      background: transparent !important;
      box-shadow: none !important;
      filter: none !important;
    }
  </style>

  <div class="container-fluid px-4 px-lg-5">
    <!-- Bookend layout: logo (left, facing right) ... centered content ... mirrored logo (right, facing left) -->
    <div class="d-flex flex-wrap justify-content-between align-items-center">

      <!-- Logo (left, facing right) -->
      <div class="flex-shrink-0 mb-3 text-center">
        <a href="{{ site.Params.footer_image_link }}" class="d-block">
          <img
            loading="lazy"
            src="/images/transparent.png"
            class="img-fluid"
            style="max-width:200px;"
            alt="{{ site.Title }}"
          />
        </a>
      </div>

      <!-- Affiliate Links + footer menu + copyright + social, centered between the two logos -->
      <div class="mb-3">
        <div class="d-flex flex-wrap align-items-baseline gap-3 mb-1">
          <strong>Affiliate Links</strong>
          {{ range site.Menus.footer }}
            <a class="footer-menu-link" href="{{ .URL | absLangURL }}">{{ .Name }}</a>
          {{ end }}
        </div>

        <div class="mb-3">
          <div><a class="footer-menu-link py-0" href="https://textexpander.com/?red=abdall&utm_source=abdall&utm_medium=revshare&utm_affiliate_network=reditus" target="_blank" rel="noopener noreferrer">Try TextExpander</a></div>
          <div><a class="footer-menu-link py-0" href="https://join.robinhood.com/abdalla62" target="_blank" rel="noopener noreferrer">Try Robinhood</a></div>
        </div>

        <div class="d-flex flex-wrap align-items-center gap-4">
          <span class="text-muted small">
            Copyright &copy; {{ dateFormat "2006" now }}
            {{ site.Params.copyright | markdownify }}
          </span>
          <ul class="list-inline social-icon mb-0 d-flex gap-3">
            {{ range site.Params.social }}
              <li class="list-inline-item m-0">
                <a
                  href="{{ .link | safeURL }}"
                  rel="noopener noreferrer"
                  target="_blank"
                  aria-label="social-profile"
                >
                  <i class="{{ .icon }}"></i>
                </a>
              </li>
            {{ end }}
          </ul>
        </div>
      </div>

      <!-- Mirrored logo (right, facing left) -->
      <div class="flex-shrink-0 mb-3 text-center">
        <a href="{{ site.Params.footer_image_link }}" class="d-block">
          <img
            loading="lazy"
            src="/images/transparent.png"
            class="img-fluid"
            style="max-width:200px; transform:scaleX(-1);"
            alt=""
          />
        </a>
      </div>
    </div>
  </div>
</footer>
<!-- /footer -->
